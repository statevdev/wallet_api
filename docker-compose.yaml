services:
  app:
    build: .
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head &&
            fastapi dev app/main.py --host 0.0.0.0"
    depends_on:
      db:
        condition: service_healthy
      db_test:
        condition: service_started
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://wallet_user:password@db:5432/wallet_api}
      TEST_DATABASE_URL: ${TEST_DATABASE_URL:-postgresql+psycopg://wallet_user:password@db_test:5432/wallet_api_test}
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wallet_api}
      POSTGRES_USER: ${POSTGRES_USER:-wallet_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
  db_test:
    image: postgres:17
    environment:
      POSTGRES_DB: ${TEST_POSTGRES_DB:-wallet_api_test}
      POSTGRES_USER: ${TEST_POSTGRES_USER:-wallet_user}
      POSTGRES_PASSWORD: ${TEST_POSTGRES_PASSWORD:-password}
    ports:
      - "${TEST_POSTGRES_PORT:-5433}:5432"

volumes:
  postgres_data:
